let currentQuestion = 0;
let answers = [];
let time = 1200; // 20 minutos
let timer;
let student = "";

function startQuiz(){
  student = document.getElementById("studentName").value;
  if(student === ""){
    alert("Ingrese su nombre");
    return;
  }
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  startTimer();
  loadQuestion();
}

function startTimer(){
  timer = setInterval(() => {
    time--;
    let m = Math.floor(time/60);
    let s = time % 60;
    document.getElementById("timer").innerText =
      `${m}:${s.toString().padStart(2,'0')}`;
    if(time <= 0) finishQuiz();
  },1000);
}

function loadQuestion(){
  let q = questions[currentQuestion];
  document.getElementById("questionNumber").innerText =
    `Pregunta ${currentQuestion+1} de ${questions.length}`;
  document.getElementById("questionImage").src = q.image;
  document.getElementById("questionText").innerText = q.text;

  let optDiv = document.getElementById("options");
  optDiv.innerHTML = "";

  q.options.forEach((opt,i)=>{
    let div = document.createElement("div");
    div.className = "option";
    
    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.id = `opt_${i}`;
    checkbox.value = i;
    checkbox.onchange = () => updateSelectedOption(i, checkbox);
    
    let label = document.createElement("label");
    label.htmlFor = `opt_${i}`;
    label.innerText = opt;
    
    div.appendChild(checkbox);
    div.appendChild(label);
    
    // Hacer que al hacer clic en el div también se active el checkbox
    div.onclick = (e) => {
      if (e.target.tagName !== 'INPUT') {
        checkbox.checked = !checkbox.checked;
        updateSelectedOption(i, checkbox);
      }
    };
    
    optDiv.appendChild(div);
  });
}

function updateSelectedOption(index, checkbox) {
  // Si es el checkbox que se está marcando
  if (checkbox.checked) {
    // Desmarcar todos los otros checkboxes
    document.querySelectorAll('#options input[type="checkbox"]').forEach((cb, i) => {
      if (i !== index) {
        cb.checked = false;
      }
    });
    answers[currentQuestion] = index;
  } else {
    // Si se desmarca y era la respuesta seleccionada, eliminarla
    if (answers[currentQuestion] === index) {
      answers[currentQuestion] = null;
    }
  }
}

function nextQuestion(){
  if(answers[currentQuestion] == null){
    alert("Seleccione una respuesta");
    return;
  }
  currentQuestion++;
  if(currentQuestion >= questions.length){
    finishQuiz();
  } else {
    loadQuestion();
  }
}

function finishQuiz(){
  clearInterval(timer);

  let score = 0;
  questions.forEach((q,i)=>{
    if(q.correct === answers[i]) score++;
  });

  let level = "";
  if(score <= 5) level = "Necesitas empezar nuestro curso desde 0";
  else if(score <= 9) level = "Lo hiciste bien pero hace falta hacer nuestro curso para mejorar";
  else if(score <= 12) level = "Excelente, ya casi superas los 1100. Haz el curso para afianzar conocimientos";
  else level = "Ya estás en otro nivel";

  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");

  document.getElementById("finalName").innerText = "Nombre: " + student;
  document.getElementById("finalScore").innerText =
    `Puntaje: ${score} / ${questions.length}`;
  document.getElementById("finalLevel").innerText = "Nivel: " + level;

  // Estadística por pregunta
  let review = document.getElementById("review");
  review.innerHTML = "";

  let emailBody = `Nombre: ${student}
Puntaje: ${score}/${questions.length}
Nivel: ${level}

`;

  questions.forEach((q,i)=>{
    let correcta = q.correct === answers[i];

    let p = document.createElement("p");
    p.textContent = `Pregunta ${i+1}: ${correcta ? "Correcta" : "Incorrecta"}`;
    p.style.color = correcta ? "green" : "red";
    review.appendChild(p);

    emailBody += `Pregunta ${i+1}: ${q.text}
`;
    emailBody += `Respuesta alumno: ${answers[i] !== undefined ? q.options[answers[i]] : 'Sin respuesta'}
`;
    emailBody += `Respuesta correcta: ${q.options[q.correct]}

`;
  });

  // Enviar correo
  let subject = "Resultados Test de Ajedrez";
  window.location.href =
    "mailto:quizacademiamillennials@gmail.com" +
    `?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailBody)}`;
}
